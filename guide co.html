<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Démo LockSelf — Connexion SSO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f2f2f4;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .demo-container {
    width: 100%;
    max-width: 1200px;
  }

  /* ========== VIEWPORT ========== */
  .viewport {
    position: relative;
    width: 100%;
    aspect-ratio: 1280 / 1030;
    overflow: hidden;
    border-radius: 14px 14px 0 0;
    background: #f0f0f2;
    box-shadow: 0 20px 60px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.05);
    user-select: none;
    -webkit-user-select: none;
  }

  /* All slide images stacked absolutely */
  .slide-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: opacity 0.55s ease;
    opacity: 1;
  }
  .slide-img.hidden {
    opacity: 0;
  }

  /* Click zones */
  .click-zone {
    position: absolute;
    top: 0;
    height: 100%;
    z-index: 30;
    cursor: pointer;
  }
  .click-zone-left {
    left: 0;
    width: 50%;
    cursor: w-resize;
  }
  .click-zone-right {
    right: 0;
    width: 50%;
    cursor: e-resize;
  }

  /* ========== CURSOR - always visible, moves fluidly ========== */
  .cursor-marker {
    position: absolute;
    z-index: 40;
    pointer-events: none;
    transform: translate(-50%, -50%);
    /* Fluid movement */
    transition: left 0.7s cubic-bezier(0.4, 0, 0.15, 1),
                top 0.7s cubic-bezier(0.4, 0, 0.15, 1);
  }

  .cursor-dot {
    width: 20px;
    height: 20px;
    background: #01B400;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.95);
    box-shadow: 0 2px 10px rgba(1,180,0,0.45);
    position: relative;
  }

  .cursor-dot::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(1,180,0,0.25);
    animation: ring-pulse 2s ease-out infinite;
  }

  @keyframes ring-pulse {
    0% { transform: scale(0.8); opacity: 0.8; }
    70% { transform: scale(2.2); opacity: 0; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  /* ========== TOOLTIP ========== */
  .tooltip-box {
    position: absolute;
    z-index: 35;
    pointer-events: none;
    /* Moves with cursor but tooltip fades separately */
    transition: left 0.7s cubic-bezier(0.4, 0, 0.15, 1),
                top 0.7s cubic-bezier(0.4, 0, 0.15, 1);
  }

  .tooltip-inner {
    background: #01B400;
    color: #ffffff;
    padding: 14px 20px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    line-height: 1.65;
    max-width: 290px;
    min-width: 170px;
    box-shadow: 0 8px 28px rgba(1,180,0,0.22), 0 2px 8px rgba(0,0,0,0.08);
    position: relative;
    overflow: hidden;
    /* Fade in/out */
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .tooltip-inner.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Subtle corner highlights */
  .tooltip-inner::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 60px; height: 60px;
    background: radial-gradient(circle at 0% 0%, rgba(255,255,255,0.15) 0%, transparent 70%);
    pointer-events: none;
    border-radius: 12px 0 0 0;
  }
  .tooltip-inner::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 80px; height: 80px;
    background: radial-gradient(circle at 100% 100%, rgba(0,0,0,0.08) 0%, transparent 70%);
    pointer-events: none;
    border-radius: 0 0 12px 0;
  }

  .tooltip-inner strong {
    color: #fff;
    font-weight: 700;
  }

  .url-copy-wrap {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 4px 8px;
    margin: 4px 0;
  }

  .copy-btn {
    pointer-events: auto;
    cursor: pointer;
    background: rgba(255,255,255,0.25);
    border: none;
    border-radius: 5px;
    padding: 3px 6px;
    font-size: 13px;
    line-height: 1;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .copy-btn:hover {
    background: rgba(255,255,255,0.45);
    transform: scale(1.1);
  }
  .copy-btn:active {
    transform: scale(0.95);
  }

  /* ========== BOTTOM BAR ========== */
  .bottom-bar {
    background: #fff;
    border-radius: 0 0 14px 14px;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 20px 60px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.05);
  }

  .dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ddd;
    border: none;
    cursor: pointer;
    transition: all 0.25s ease;
    padding: 0;
  }
  .dot.active {
    background: #01B400;
    box-shadow: 0 0 0 3px rgba(1,180,0,0.2);
    transform: scale(1.2);
  }
  .dot.done { background: #8fd68f; }
  .dot:hover { background: #4dd84b; transform: scale(1.15); }

  .step-info {
    font-size: 13px;
    color: #999;
    font-weight: 500;
  }
  .step-info span { color: #01B400; font-weight: 700; }

  .nav-btns {
    display: flex;
    gap: 6px;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    padding: 9px 22px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-prev {
    background: transparent;
    color: #999;
  }
  .btn-prev:hover { color: #01B400; background: rgba(1,180,0,0.06); }

  .btn-next {
    background: #01B400;
    color: #fff;
    box-shadow: 0 2px 8px rgba(1,180,0,0.2);
  }
  .btn-next:hover {
    background: #019e00;
    box-shadow: 0 4px 14px rgba(1,180,0,0.3);
    transform: translateY(-1px);
  }
</style>
</head>

<script>
function copyURL(btn) {
  navigator.clipboard.writeText('https://eurex.lockself-cloud.com/api/').then(() => {
    const orig = btn.textContent;
    btn.textContent = '✅';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

const STEPS = [{"cx": 60.3, "cy": 43.3, "tx": 64.3, "ty": 41.3, "text": "Vous arrivez sur la page de connexion LockSelf.<br><strong>Cliquez sur l'onglet « SSO ».</strong>", "slide": 0}, {"cx": 63.9, "cy": 36.4, "tx": 67.9, "ty": 34.4, "text": "Vous êtes sur l'onglet SSO.<br><strong>Cliquez sur l'engrenage ⚙️</strong> pour afficher le champ de configuration.", "slide": 1}, {"cx": 57.9, "cy": 50.0, "tx": 61.9, "ty": 48.0, "text": "Le champ <strong>« URL API »</strong> apparaît.<br>C'est ici que vous allez renseigner l'adresse du serveur.", "slide": 2}, {"cx": 58.4, "cy": 50.1, "tx": 62.4, "ty": 48.1, "text": "Collez l'URL suivante :<br><span class='url-copy-wrap'><strong>https://eurex.lockself-cloud.com/api/</strong><button class='copy-btn' onclick='copyURL(this)' title='Copier'>📋</button></span>", "slide": 3}, {"cx": 63.0, "cy": 69.0, "tx": 67.0, "ty": 67.0, "text": "Puis cliquez sur <strong>« Entrer »</strong> pour valider la connexion.", "slide": 3}, {"cx": 64.3, "cy": 54.6, "tx": 68.3, "ty": 52.6, "text": "Saisissez votre <strong>code PIN personnel</strong> à l'aide du pavé numérique affiché à l'écran.", "slide": 4}, {"cx": 51.0, "cy": 57.8, "tx": 46.0, "ty": 63.8, "text": "✅ <strong>Vous êtes connecté !</strong><br>Bienvenue sur LockPass, votre coffre-fort de mots de passe.", "slide": 5}];
const TOTAL = STEPS.length;
const NUM_SLIDES = 6;
let current = 0;
let busy = false;

const slideImgs = [];
for (let i = 0; i < NUM_SLIDES; i++) slideImgs.push(document.getElementById('slide' + i));

const cursorEl = document.getElementById('cursor');
const tooltipBox = document.getElementById('tooltipBox');
const tooltipInner = document.getElementById('tooltipInner');
const dotsEl = document.getElementById('dots');
const stepInfo = document.getElementById('stepInfo');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

// Create dots
for (let i = 0; i < TOTAL; i++) {
  const d = document.createElement('button');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(d);
}

// Initially: only slide 0 visible, rest hidden via class
// Set z-index so current is always on top
function setSlideVisibility(idx) {
  for (let i = 0; i < TOTAL; i++) {
    if (i === idx) {
      slideImgs[i].classList.remove('hidden');
      slideImgs[i].style.zIndex = 10;
    } else {
      slideImgs[i].style.zIndex = 1;
    }
  }
}

function moveCursor(idx) {
  cursorEl.style.left = STEPS[idx].cx + '%';
  cursorEl.style.top = STEPS[idx].cy + '%';
  tooltipBox.style.left = STEPS[idx].tx + '%';
  tooltipBox.style.top = STEPS[idx].ty + '%';
}

function showTooltip(idx) {
  tooltipInner.innerHTML = STEPS[idx].text;
  tooltipInner.classList.add('visible');
}

function hideTooltip() {
  tooltipInner.classList.remove('visible');
}

function updateUI() {
  stepInfo.innerHTML = '<span>' + (current + 1) + '</span> / ' + TOTAL;
  prevBtn.style.visibility = current === 0 ? 'hidden' : 'visible';
  nextBtn.textContent = current === TOTAL - 1 ? '↻ Rejouer' : 'Suivant →';

  // Update dots
  for (let i = 0; i < TOTAL; i++) {
    dotsEl.children[i].classList.remove('active', 'done');
    if (i === current) dotsEl.children[i].classList.add('active');
    else if (i < current) dotsEl.children[i].classList.add('done');
  }
}

function goTo(idx) {
  if (idx < 0 || idx >= TOTAL || idx === current || busy) return;
  busy = true;

  const prev = current;
  const prevSlide = STEPS[prev].slide;
  const nextSlide = STEPS[idx].slide;
  current = idx;

  // 1. Hide tooltip
  hideTooltip();

  // 2. After short delay, move cursor and crossfade if needed
  setTimeout(() => {
    moveCursor(current);

    // Only crossfade if the image actually changes
    if (prevSlide !== nextSlide) {
      slideImgs[nextSlide].style.zIndex = 10;
      slideImgs[prevSlide].style.zIndex = 5;
      slideImgs[nextSlide].classList.remove('hidden');
      setTimeout(() => {
        slideImgs[prevSlide].classList.add('hidden');
        slideImgs[prevSlide].style.zIndex = 1;
      }, 600);
    }

    // 3. Show new tooltip after cursor arrives
    setTimeout(() => {
      showTooltip(current);
      updateUI();
      busy = false;
    }, 750);

  }, 200);
}

function next() {
  if (current === TOTAL - 1) {
    // Replay from start
    busy = true;
    hideTooltip();
    setTimeout(() => {
      const prevSlide = STEPS[current].slide;
      current = 0;
      const newSlide = STEPS[0].slide;
      moveCursor(0);
      if (prevSlide !== newSlide) {
        slideImgs[newSlide].style.zIndex = 10;
        slideImgs[prevSlide].style.zIndex = 5;
        slideImgs[newSlide].classList.remove('hidden');
        setTimeout(() => {
          slideImgs[prevSlide].classList.add('hidden');
          slideImgs[prevSlide].style.zIndex = 1;
        }, 600);
      }
      setTimeout(() => {
        showTooltip(0);
        updateUI();
        busy = false;
      }, 750);
    }, 200);
  } else {
    goTo(current + 1);
  }
}

function prevStep() {
  goTo(current - 1);
}

// Events
nextBtn.addEventListener('click', next);
prevBtn.addEventListener('click', prevStep);
document.getElementById('zoneLeft').addEventListener('click', prevStep);
document.getElementById('zoneRight').addEventListener('click', next);

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') prevStep();
});

// ===== INIT =====
// Hide all slides except the one for step 0
const initSlide = STEPS[0].slide;
for (let i = 0; i < NUM_SLIDES; i++) {
  if (i !== initSlide) slideImgs[i].classList.add('hidden');
  else slideImgs[i].style.zIndex = 10;
}

// Position cursor at step 0 immediately (no transition on load)
cursorEl.style.transition = 'none';
tooltipBox.style.transition = 'none';
moveCursor(0);

// Force layout, then re-enable transitions
requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    cursorEl.style.transition = '';
    tooltipBox.style.transition = '';
    // Show tooltip after a moment
    tooltipInner.innerHTML = STEPS[0].text;
    setTimeout(() => tooltipInner.classList.add('visible'), 400);
  });
});
</script>
